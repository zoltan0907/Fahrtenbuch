<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokales Fahrtenbuch Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        
        /* Sidebar & Boxen */
        .sidebar { display: flex; flex-direction: column; gap: 20px; position: sticky; top: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .box h3 { margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 18px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .info-row strong { color: #2980b9; }
        
        /* Formulare */
        .form-group { display: flex; flex-direction: column; margin-bottom: 12px;}
        label { margin-bottom: 5px; font-size: 13px; font-weight: bold; color: #555; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .input-with-btn { display: flex; gap: 5px; }
        .btn-icon { width: auto; padding: 10px 15px; background-color: #34495e; color: white; border: none; border-radius: 4px; cursor: pointer;}
        
        .main-content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        
        /* Buttons */
        button { background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 15px; cursor: pointer; transition: background 0.3s; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
        .btn-submit { grid-column: span 2; margin-top: 10px;}
        .btn-calc { background-color: #f39c12; grid-column: span 2; }
        .btn-calc:hover { background-color: #f1c40f; }
        .btn-calc:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        /* Tabelle & Spaltenfilter */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: top; }
        th { background-color: #f8f9fa; color: #2c3e50; }
        
        .col-filter { width: 100%; padding: 5px; font-size: 11px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 3px; font-weight: normal; }
        
        .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }
        .delete-btn { background-color: #e74c3c; padding: 6px 10px; font-size: 11px; border-radius: 3px; }
        .delete-btn:hover { background-color: #c0392b; }
        .copy-btn { background-color: #3498db; padding: 6px 10px; font-size: 11px; border-radius: 3px; }
        .copy-btn:hover { background-color: #2980b9; }

        .hidden { display: none !important; }
        .loading { font-size: 12px; color: #e67e22; margin-top: 5px; font-weight: bold; }

        /* Map Modal */
        .map-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .map-container { background: white; width: 95%; max-width: 600px; height: 70vh; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .map-header { padding: 15px; background: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .map-header button { background: #e74c3c; padding: 8px 15px; font-size: 13px; margin: 0; }
        #mapView { flex-grow: 1; width: 100%; cursor: crosshair; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>🚗 Mein lokales Fahrtenbuch</h1>

    <div class="container">
        <div class="main-content">
            <h3 id="formTitle">Neue Fahrt eintragen</h3>
            <form id="fahrtForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="datum">Datum</label>
                        <input type="date" id="datum" required>
                    </div>
                    <div class="form-group">
                        <label for="distanz">Distanz (km)</label>
                        <input type="number" step="0.1" id="distanz" placeholder="z.B. 25.5" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="start">Startadresse</label>
                        <div class="input-with-btn">
                            <input type="text" id="start" placeholder="Tippen oder 📍 klicken" required ondblclick="openMapPicker('start')">
                            <button type="button" class="btn-icon" onclick="openMapPicker('start')" title="Auf Karte wählen">📍</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="ziel">Zieladresse</label>
                        <div class="input-with-btn">
                            <input type="text" id="ziel" placeholder="Tippen oder 📍 klicken" required ondblclick="openMapPicker('ziel')">
                            <button type="button" class="btn-icon" onclick="openMapPicker('ziel')" title="Auf Karte wählen">📍</button>
                        </div>
                    </div>
                    
                    <button type="button" class="btn-calc" id="btnBerechnen" onclick="berechneRoute()">📍 Distanz automatisch berechnen</button>
                    <div id="calcStatus" class="loading hidden">Berechne Route... Bitte warten.</div>
                    
                    <button type="submit" class="btn-submit">💾 Fahrt speichern</button>
                </div>
            </form>

            <table id="fahrtenTabelle">
                <thead>
                    <tr>
                        <th>Datum<br><input type="text" id="colFilterDatum" class="col-filter" placeholder="z.B. 2024 oder .05." onkeyup="aktualisiereAnsicht()"></th>
                        <th>Start<br><input type="text" id="colFilterStart" class="col-filter" placeholder="Suchen..." onkeyup="aktualisiereAnsicht()"></th>
                        <th>Ziel<br><input type="text" id="colFilterZiel" class="col-filter" placeholder="Suchen..." onkeyup="aktualisiereAnsicht()"></th>
                        <th>Distanz</th>
                        <th>Kosten</th>
                        <th>Aktionen</th>
                    </tr>
                </thead>
                <tbody id="tabelleBody"></tbody>
            </table>
        </div>

        <div class="sidebar">
            <div class="box">
                <h3>⚙️ Routing Engine</h3>
                <div class="form-group">
                    <label for="apiAuswahl">Berechnungsmethode:</label>
                    <select id="apiAuswahl" onchange="toggleApiSettings()">
                        <option value="none">Manuelle Eingabe</option>
                        <option value="osm">OpenStreetMap (Kostenlos)</option>
                        <option value="google">Google Maps API</option>
                    </select>
                </div>
                <div class="form-group hidden" id="googleKeyContainer">
                    <label for="apiKey">Google API Key:</label>
                    <input type="password" id="apiKey" placeholder="AIzaSyB...">
                </div>
            </div>

            <div class="box">
                <h3>📊 Globale Auswertung</h3>
                <div class="form-group">
                    <label for="filterVon">Von:</label>
                    <input type="date" id="filterVon">
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="filterBis">Bis:</label>
                    <input type="date" id="filterBis">
                </div>

                <div class="info-row"><span>Angezeigte Fahrten:</span><strong id="infoAnzahl">0</strong></div>
                <div class="info-row"><span>Summe Distanz:</span><strong id="infoDistanz">0.0 km</strong></div>
                <div class="info-row"><span>Summe Kosten:</span><strong id="infoKosten">0,00 €</strong></div>
                
                <div class="form-group" style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                    <label for="kmPreis">Preis pro km (€):</label>
                    <input type="number" step="0.01" id="kmPreis" value="0.30" onchange="aktualisiereAnsicht()">
                </div>
            </div>
        </div>
    </div>

    <div id="mapModal" class="map-modal">
        <div class="map-container">
            <div class="map-header">
                <span id="mapTitle">Tippe auf die Karte</span>
                <button type="button" onclick="closeMapPicker()">Abbrechen</button>
            </div>
            <div id="mapView"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'mein_fahrtenbuch_daten';
        const SETTINGS_KEY = 'mein_fahrtenbuch_settings';
        let fahrten = [];

        // --- MAP PICKER ---
        let pickerMap = null, pickerMarker = null, currentTargetField = '';
        function openMapPicker(fieldId) {
            currentTargetField = fieldId;
            document.getElementById('mapModal').style.display = 'flex';
            if (!pickerMap) {
                pickerMap = L.map('mapView').setView([51.165, 10.451], 6); 
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(pickerMap);
                pickerMap.on('click', async function(e) {
                    const { lat, lng } = e.latlng;
                    if (pickerMarker) pickerMap.removeLayer(pickerMarker);
                    pickerMarker = L.marker([lat, lng]).addTo(pickerMap);
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`);
                        const data = await res.json();
                        if(data && data.address) {
                            let addr = "";
                            const a = data.address;
                            if(a.road) addr += a.road + " ";
                            if(a.house_number) addr += a.house_number + ", ";
                            if(a.postcode) addr += a.postcode + " ";
                            if(a.city || a.town || a.village) addr += (a.city || a.town || a.village);
                            document.getElementById(currentTargetField).value = addr.trim() || data.display_name;
                            closeMapPicker();
                        }
                    } catch (err) { alert("Adress-Suche fehlgeschlagen."); }
                });
            }
            setTimeout(() => { pickerMap.invalidateSize(); pickerMap.locate({setView: true, maxZoom: 14}); }, 100);
        }
        function closeMapPicker() { document.getElementById('mapModal').style.display = 'none'; }

        // --- INITIALISIERUNG ---
        window.onload = function() {
            ladeDaten();
            ladeEinstellungen();
            document.getElementById('filterVon').value = getErsterTagDesMonats();
            document.getElementById('filterBis').value = getLetzterTagDesMonats();
            aktualisiereAnsicht();
            toggleApiSettings();
        };

        function ladeDaten() { const d = localStorage.getItem(STORAGE_KEY); if (d) fahrten = JSON.parse(d); }
        function speichereDaten() { localStorage.setItem(STORAGE_KEY, JSON.stringify(fahrten)); }
        function ladeEinstellungen() {
            const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
            if(s.apiAuswahl) document.getElementById('apiAuswahl').value = s.apiAuswahl;
            if(s.apiKey) document.getElementById('apiKey').value = s.apiKey;
            if(s.kmPreis) document.getElementById('kmPreis').value = s.kmPreis;
        }
        function speichereEinstellungen() {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify({
                apiAuswahl: document.getElementById('apiAuswahl').value,
                apiKey: document.getElementById('apiKey').value,
                kmPreis: parseFloat(document.getElementById('kmPreis').value) || 0.30
            }));
        }

        function toggleApiSettings() {
            const a = document.getElementById('apiAuswahl').value;
            document.getElementById('googleKeyContainer').classList.toggle('hidden', a !== 'google');
            document.getElementById('btnBerechnen').classList.toggle('hidden', a === 'none');
            speichereEinstellungen();
        }

        async function berechneRoute() {
            const s = document.getElementById('start').value, z = document.getElementById('ziel').value, m = document.getElementById('apiAuswahl').value;
            if(!s || !z) return alert("Start/Ziel fehlen!");
            const btn = document.getElementById('btnBerechnen'), st = document.getElementById('calcStatus');
            btn.disabled = true; st.classList.remove('hidden');
            try {
                let d = 0;
                if (m === 'osm') {
                    const gS = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(s)}`).then(r => r.json());
                    const gZ = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(z)}`).then(r => r.json());
                    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${gS[0].lon},${gS[0].lat};${gZ[0].lon},${gZ[0].lat}?overview=false`).then(r => r.json());
                    d = r.routes[0].distance / 1000;
                } else if (m === 'google') {
                    const key = document.getElementById('apiKey').value;
                    if(!window.google) await new Promise((res, rej) => {
                        const sc = document.createElement('script'); sc.src = `https://maps.googleapis.com/maps/api/js?key=${key}`;
                        sc.onload = res; sc.onerror = rej; document.head.appendChild(sc);
                    });
                    const res = await new Promise((res, rej) => new google.maps.DistanceMatrixService().getDistanceMatrix({origins:[s],destinations:[z],travelMode:'DRIVING'}, (r,st) => st=='OK'?res(r):rej(st)));
                    d = res.rows[0].elements[0].distance.value / 1000;
                }
                document.getElementById('distanz').value = d.toFixed(1);
            } catch (e) { alert("Fehler: " + e); } finally { btn.disabled = false; st.classList.add('hidden'); }
        }

        function formatLocalDatum(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        function getLetztesDatum() { if(!fahrten.length) return getHeute(); return formatLocalDatum(new Date(Math.max(...fahrten.map(f=>new Date(f.datum))))); }
        function getHeute() { return formatLocalDatum(new Date()); }
        function getErsterTagDesMonats() { const d = new Date(); return formatLocalDatum(new Date(d.getFullYear(), d.getMonth(), 1)); }
        function getLetzterTagDesMonats() { const d = new Date(); return formatLocalDatum(new Date(d.getFullYear(), d.getMonth()+1, 0)); }

        function aktualisiereAnsicht() {
            speichereEinstellungen();
            
            // Sidebar-Filter (Zeitraum)
            const v = document.getElementById('filterVon').value;
            const b = document.getElementById('filterBis').value;
            const p = parseFloat(document.getElementById('kmPreis').value) || 0.30;
            
            // Spalten-Filter (Text)
            const colDatum = document.getElementById('colFilterDatum').value.toLowerCase();
            const colStart = document.getElementById('colFilterStart').value.toLowerCase();
            const colZiel = document.getElementById('colFilterZiel').value.toLowerCase();

            // Filtern
            let f = fahrten.filter(fahrt => {
                // 1. Zeitfenster-Filter prüfen
                if (v && fahrt.datum < v) return false;
                if (b && fahrt.datum > b) return false;

                // 2. Spalten-Filter prüfen
                const deDatum = new Date(fahrt.datum).toLocaleDateString('de-DE').toLowerCase();
                if (colDatum && !deDatum.includes(colDatum)) return false;
                if (colStart && !fahrt.start.toLowerCase().includes(colStart)) return false;
                if (colZiel && !fahrt.ziel.toLowerCase().includes(colZiel)) return false;

                return true;
            }).sort((x,y) => new Date(y.datum) - new Date(x.datum));

            // Tabelle aufbauen
            const tb = document.getElementById('tabelleBody'); 
            tb.innerHTML = '';
            let sD = 0, sK = 0;
            
            f.forEach(fahrt => {
                const k = fahrt.distanz * p;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(fahrt.datum).toLocaleDateString('de-DE')}</td>
                    <td>${fahrt.start}</td>
                    <td>${fahrt.ziel}</td>
                    <td>${fahrt.distanz.toFixed(1).replace('.',',')} km</td>
                    <td>${k.toFixed(2).replace('.',',')} €</td>
                    <td class="action-btns">
                        <button type="button" class="copy-btn" onclick="dupliziereFahrt(${fahrt.id})">Kopieren</button>
                        <button type="button" class="delete-btn" onclick="loescheFahrt(${fahrt.id})">Löschen</button>
                    </td>
                `;
                tb.appendChild(tr); 
                sD += fahrt.distanz; 
                sK += k;
            });

            // Auswertung rechts aktualisieren (Reagiert jetzt auch auf die Spaltenfilter!)
            document.getElementById('infoAnzahl').innerText = f.length;
            document.getElementById('infoDistanz').innerText = sD.toFixed(1).replace('.',',') + ' km';
            document.getElementById('infoKosten').innerText = sK.toFixed(2).replace('.',',') + ' €';
            document.getElementById('datum').value = getLetztesDatum();
        }

        function dupliziereFahrt(id) {
            const fahrt = fahrten.find(f => f.id === id);
            if (fahrt) {
                document.getElementById('start').value = fahrt.start;
                document.getElementById('ziel').value = fahrt.ziel;
                document.getElementById('distanz').value = fahrt.distanz;
                document.getElementById('datum').value = getLetztesDatum();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('formTitle').innerText = "Fahrt kopiert - bitte Datum prüfen";
                setTimeout(() => { document.getElementById('formTitle').innerText = "Neue Fahrt eintragen"; }, 3000);
            }
        }

        document.getElementById('fahrtForm').addEventListener('submit', function(e) {
            e.preventDefault();
            fahrten.push({ 
                id: Date.now(), 
                datum: document.getElementById('datum').value, 
                start: document.getElementById('start').value, 
                ziel: document.getElementById('ziel').value, 
                distanz: parseFloat(document.getElementById('distanz').value.replace(',','.')) 
            });
            speichereDaten();
            ['distanz','start','ziel'].forEach(id => document.getElementById(id).value = '');
            
            // Spaltenfilter nach neuem Eintrag zurücksetzen, falls welche aktiv waren
            ['colFilterDatum', 'colFilterStart', 'colFilterZiel'].forEach(id => document.getElementById(id).value = '');
            
            aktualisiereAnsicht();
        });

        function loescheFahrt(id) { 
            if(confirm("Möchtest du diese Fahrt wirklich löschen?")) { 
                fahrten = fahrten.filter(f => f.id !== id); 
                speichereDaten(); 
                aktualisiereAnsicht(); 
            } 
        }

        ['filterVon', 'filterBis'].forEach(id => document.getElementById(id).addEventListener('change', aktualisiereAnsicht));
    </script>
</body>
</html>
